<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpaceOS | v20.0 GOD_MODE</title>
    <style>
        :root { --accent: #00d2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Header & Navigation */
        .top-bar { background: #0a0a0f; border-bottom: 1px solid #222; padding: 10px 15px; display: flex; align-items: center; gap: 15px; z-index: 100; }
        .url-bar { flex: 1; background: #000; border: 1px solid #333; border-radius: 6px; padding: 8px 15px; display: flex; }
        .url-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn { background: var(--accent); color: black; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }

        /* The Viewport */
        .browser-wrap { flex: 1; background: white; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Status Indicators */
        .status { font-size: 10px; font-weight: bold; color: #0f0; border: 1px solid #0f0; padding: 2px 8px; border-radius: 10px; text-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-weight: 900; letter-spacing: 2px; color: var(--accent);">SPACEOS_V20</div>
        <div class="status">ENGINE: SERVICE_WORKER_ACTIVE</div>
        <div class="url-bar">
            <input type="text" id="target" placeholder="Enter any URL (Discord, YouTube, etc.)" onkeydown="if(event.key==='Enter') launch()">
        </div>
        <button class="btn" onclick="launch()">Execute</button>
    </div>

    <div class="browser-wrap">
        <iframe id="os-frame" src="about:blank"></iframe>
    </div>

    <script>
        // Initialize the Reverse Proxy Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('SpaceOS Backend Sync Complete');
            }).catch(err => {
                alert('Service Worker Failed. Please host this on HTTPS (GitHub Pages).');
            });
        }

        function launch() {
            const input = document.getElementById('target').value;
            let url = input.includes('.') ? (input.startsWith('http') ? input : 'https://' + input) : 'https://www.google.com/search?q=' + encodeURIComponent(input);
            
            // Route through the local Service Worker Interceptor
            // This rewrites the request in real-time
            document.getElementById('os-frame').src = '/service/' + btoa(url);
        }
    </function launchCloak() {
    // 1. Open a new window with no URL (about:blank)
    const win = window.open();
    if (!win) {
        alert("Pop-up blocked! Please allow pop-ups for this site to use Ghost Mode.");
        return;
    }

    // 2. Define the styling to make the iframe full-screen
    const style = "margin:0; height:100vh; width:100vw; border:none; overflow:hidden; display:block;";
    
    // 3. Get the URL of your current proxy (the one on GitHub)
    const url = window.location.href;

    // 4. Inject the proxy into the new "about:blank" window
    win.document.body.innerHTML = `
        <title>Google Docs</title>
        <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_wallpapers/google_docs_logo_2020q4.ico">
        <iframe src="${url}" style="${style}"></iframe>
    `;

    // 5. Optional: Redirect the "real" tab to something safe so teachers don't see it
    window.location.replace("https://classroom.google.com");
}>
</body>
</html>
